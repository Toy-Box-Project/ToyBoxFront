@if(totalPages > 1){

<nav class="pagination">

    <button
        class="btn-page"
        [disabled]="currentPage === 1"
        (click)="previous()">

        ←

    </button>

    @for(page of pages; track page){

    <button

        class="btn-page"

        [class.active]="page === currentPage"

        (click)="goTo(page)">

        {{ page }}

    </button>

    }

    <button
        class="btn-page"
        [disabled]="currentPage === totalPages"
        (click)="next()">

        →

    </button>

</nav>

}
