@if(totalPages > 1){

<nav class="pagination">

    <button
        class="page-btn"
        [disabled]="currentPage === 1"
        (click)="previous()">

        ←

    </button>

    @for(page of pages; track page){

        <button

            class="page-btn"

            [class.active]="page === currentPage"

            (click)="goTo(page)">

            {{ page }}

        </button>

    }

    <button
        class="page-btn"
        [disabled]="currentPage === totalPages"
        (click)="next()">

        →

    </button>

</nav>

}
