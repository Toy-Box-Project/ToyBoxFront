<div class="stars-wrapper">
  <div class="stars" role="img" [attr.aria-label]="'Calificación: ' + displayRating + ' de 5 estrellas'">
    @for (star of stars; track star) {
      <span
        class="material-symbols-outlined star"
        [class.star--filled]="star <= roundedRating"
        [class.star--half]="star - 0.5 === roundedRating"
        [class.clickable]="!readonly"
        [style.fontSize.px]="size"
        [style.color]="star <= roundedRating ? color : '#e0e0e0'"
        (click)="setRating(star)"
        [attr.aria-hidden]="!readonly"
        role="button"
        tabindex="0"
      >
        @if (star <= roundedRating) {
          star
        } @else {
          star_border
        }
      </span>
    }
  </div>

  @if (reviewCount > 0 || rating > 0) {
    <div class="rating-info">
      <span class="rating-value">{{ displayRating }}</span>
      @if (reviewCount > 0) {
        <span class="review-count">({{ reviewCount }} reseña{{ reviewCount !== 1 ? 's' : '' }})</span>
      }
    </div>
  }
</div>
