<nav class="navbar">

    <a class="navbar-logo" routerLink="/">
        <img src="assets/images/Logos/toybox_logoprincipal.svg" alt="Toybox" class="logo-img" />
    </a>

    @if (!isLoggedIn) {
    <div class="navbar-auth">
        <button class="btn-signin" (click)="goToLogin()">Sign in</button>
        <button class="btn-register" (click)="goToRegister()">Register</button>
    </div>
    }

    @if (isLoggedIn) {
    <div class="navbar-actions">
        <a class="nav-item" routerLink="/notifications">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span>Notificaciones</span>
        </a>

        <a class="nav-item" routerLink="/user/favorites">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
            <span>Favorito</span>
        </a>

        <a class="nav-item" routerLink="/chat">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
            </svg>
            <span>Buzón</span>
        </a>

        <a class="nav-item" routerLink="/user/my-products">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
            <span>Mis productos</span>
        </a>

        <a class="nav-item profile-item" routerLink="/user/profile">
            <img [src]="userAvatar || 'assets/images/avatar-placeholder.png'" alt="Mi perfil" class="avatar" />
            <span>Mi perfil</span>
        </a>

        <button class="btn-sell" (click)="goToCreateProduct()">
            + Vender
        </button>
    </div>
    }
</nav>
