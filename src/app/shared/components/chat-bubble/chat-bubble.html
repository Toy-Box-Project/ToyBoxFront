<!-- CHAT BUBBLE
     Uso: <app-chat-bubble [message]="msg" [isOwn]="true | false">
-->
<div class="tb-bubble" [class.tb-bubble--own]="isOwn" [class.tb-bubble--other]="!isOwn">

  <!-- AVATAR (only for the other person's bubbles) -->
  @if (!isOwn) {
    <div class="tb-bubble__avatar" aria-hidden="true">
      @if (message.senderAvatar) {
        <img [src]="message.senderAvatar" [alt]="message.senderName" class="tb-bubble__avatar-img" />
      } @else {
        <span class="tb-bubble__avatar-initial">{{ message.senderName.charAt(0).toUpperCase() }}</span>
      }
    </div>
  }

  <div class="tb-bubble__content">

    <!-- SENDER NAME (only for the other person's bubbles) -->
    @if (!isOwn) {
      <span class="tb-bubble__sender">{{ message.senderName }}</span>
    }

    <div class="tb-bubble__text">{{ message.text }}</div>

    <div class="tb-bubble__meta">
      <time class="tb-bubble__time" [attr.datetime]="message.sentAt.toISOString()">
        {{ message.sentAt | date:'HH:mm' }}
      </time>
      @if (isOwn) {
        <span class="material-symbols-outlined tb-bubble__status" [class.tb-bubble__status--read]="message.read" [attr.aria-label]="message.read ? 'Leído' : 'Enviado'">
          {{ message.read ? 'done_all' : 'done' }}
        </span>
      }
    </div>

  </div>

</div>
