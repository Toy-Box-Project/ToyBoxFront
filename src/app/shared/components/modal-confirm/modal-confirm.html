@if (isOpen) {
  <div class="modal-backdrop" (click)="onCancel()">
    <section class="confirm-modal" role="dialog" aria-modal="true" [attr.aria-labelledby]="'modal-confirm-title'" (click)="$event.stopPropagation()">
      <div class="modal-icon" [class]="variant">
        @if (variant === 'danger') {
          <span>!</span>
        } @else if (variant === 'warning') {
          <span>?</span>
        } @else {
          <span>i</span>
        }
      </div>

      <div class="modal-content">
        <h2 id="modal-confirm-title">{{ title }}</h2>
        <p>{{ message }}</p>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn--ghost" (click)="onCancel()">
          {{ cancelText }}
        </button>
        <button type="button" class="btn btn--primary" [class.btn--danger]="variant === 'danger'" (click)="onConfirm()">
          {{ confirmText }}
        </button>
      </div>
    </section>
  </div>
}
