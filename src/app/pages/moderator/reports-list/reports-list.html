<div class="pattern-bg"></div>

<main class="moderator-page relative-z-10">

  <header class="page-header">
    <div>
      <p class="eyebrow">Moderación</p>
      <h1>Listado de reportes</h1>
    </div>
    <div class="filters">
      <input type="search" placeholder="Buscar reportes" [(ngModel)]="searchTerm" />
      <select [(ngModel)]="statusFilter" aria-label="Filtrar reportes por estado">
        <option value="all">Todos los reportes</option>
        <option value="pending">Pendientes</option>
        <option value="resolved">Resueltos</option>
      </select>
    </div>
  </header>

  <section class="reports-list">
    @for (report of filteredReports; track report.id) {
      <article class="report-card">
        <div class="report-main">
          <span class="status-pill" [class.resolved]="report.status === 'resolved'">{{ statusLabel(report.status) }}</span>
          <h2>{{ report.itemTitle }}</h2>
          <p>{{ report.reason }}</p>
          <small>Usuario reportado: {{ report.reportedUser }} - Reportado por: {{ report.reporter }}</small>
        </div>
        <div class="report-side">
          <time>{{ report.date }}</time>
          <a [routerLink]="['/moderator/report', report.id]">Ver detalle</a>
        </div>
      </article>
    }
  </section>
</main>
