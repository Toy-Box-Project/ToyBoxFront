<div class="pattern-bg"></div>

<main class="detail-page relative-z-10">

  <a routerLink="/moderator/reports" class="back-link">Volver a reportes</a>

  <header class="page-header">
    <div>
      <p class="eyebrow">Moderación</p>
      <h1>Reporte #{{ report.id }}</h1>
    </div>
    <span class="status-pill" [class.resolved]="report.status === 'resolved'">{{ reportStatusLabel }}</span>
  </header>

  <section class="detail-grid">
    <article class="panel item-panel">
      <h2>{{ report.itemTitle }}</h2>
      <p>{{ report.itemDescription }}</p>
      <dl>
        <div>
          <dt>Usuario reportado</dt>
          <dd>{{ report.reportedUser }}</dd>
        </div>
        <div>
          <dt>Reportado por</dt>
          <dd>{{ report.reporter }}</dd>
        </div>
        <div>
          <dt>Fecha</dt>
          <dd>{{ report.reportDate }}</dd>
        </div>
      </dl>
    </article>

    <aside class="panel decision-panel">
      <h2>Decisión</h2>
      <p>{{ report.reason }}</p>
      <div class="decision-actions">
        <button type="button" class="btn btn--ghost" (click)="openAction('resolve')">Resolver reporte</button>
        <button type="button" class="btn btn--danger" (click)="openAction('withdraw')">Retirar artículo</button>
        <button type="button" class="btn btn--primary" (click)="openAction('reactivate')">Reactivar artículo</button>
      </div>
    </aside>
  </section>
</main>

<app-modal-confirm
  [isOpen]="!!pendingAction"
  [title]="modalTitle"
  [message]="modalMessage"
  confirmText="Confirmar"
  [variant]="pendingAction === 'withdraw' ? 'danger' : 'info'"
  (confirmed)="confirmAction()"
  (cancelled)="pendingAction = null"
/>

<app-toast
  [visible]="toast.visible"
  [type]="toast.type"
  [title]="toast.title"
  [message]="toast.message"
  (dismissed)="toast.visible = false"
/>
