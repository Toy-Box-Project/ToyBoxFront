<main class="management-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Administration</p>
      <h1>Users management</h1>
    </div>
    <div class="filters">
      <input type="search" placeholder="Search users" [(ngModel)]="searchTerm" />
      <select [(ngModel)]="statusFilter" aria-label="Filter by status">
        <option value="all">All statuses</option>
        <option value="active">Active</option>
        <option value="blocked">Blocked</option>
      </select>
    </div>
  </header>

  <section class="table-panel">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Role</th>
          <th>Status</th>
          <th>Items</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for (user of filteredUsers; track user.id) {
          <tr>
            <td>
              <strong>{{ user.username }}</strong>
              <span>{{ user.email }}</span>
            </td>
            <td>{{ user.role }}</td>
            <td>
              <span class="status-pill" [class.blocked]="user.status === 'blocked'">{{ user.status }}</span>
            </td>
            <td>{{ user.publishedItems }}</td>
            <td>
              <button type="button" class="link-button" [class.danger]="user.status === 'active'" (click)="askStatusChange(user)">
                {{ user.status === 'active' ? 'Block' : 'Unblock' }}
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </section>
</main>

<app-modal-confirm
  [isOpen]="!!selectedUser"
  [title]="selectedUser?.status === 'active' ? 'Block user' : 'Unblock user'"
  [message]="'Change status for ' + selectedUser?.username + '?'"
  [confirmText]="selectedUser?.status === 'active' ? 'Block' : 'Unblock'"
  [variant]="selectedUser?.status === 'active' ? 'danger' : 'info'"
  (confirmed)="confirmStatusChange()"
  (cancelled)="selectedUser = null"
/>

<app-toast
  [visible]="toast.visible"
  [type]="toast.type"
  [title]="toast.title"
  [message]="toast.message"
  (dismissed)="toast.visible = false"
/>
