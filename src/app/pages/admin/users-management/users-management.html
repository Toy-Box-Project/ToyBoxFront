<div class="pattern-bg"></div>

<main class="management-page relative-z-10">

  <header class="page-header">
    <div>
      <p class="eyebrow">Administración</p>
      <h1>Gestión de usuarios</h1>
    </div>
    <div class="filters">
      <input type="search" placeholder="Buscar usuarios" [(ngModel)]="searchTerm" />
      <select [(ngModel)]="statusFilter" aria-label="Filtrar por estado">
        <option value="all">Todos los estados</option>
        <option value="active">Activos</option>
        <option value="blocked">Bloqueados</option>
      </select>
    </div>
  </header>

  <section class="table-panel">
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Articulos</th>
          <th>Accion</th>
        </tr>
      </thead>
      <tbody>
        @for (user of filteredUsers; track user.id) {
          <tr>
            <td data-label="Usuario">
              <strong>{{ user.username }}</strong>
              <span>{{ user.email }}</span>
            </td>
            <td data-label="Rol">{{ roleLabel(user.role) }}</td>
            <td data-label="Estado">
              <span class="status-pill" [class.blocked]="user.status === 'blocked'">{{ statusLabel(user.status) }}</span>
            </td>
            <td data-label="Articulos">{{ user.publishedItems }}</td>
            <td data-label="Accion">
              <button type="button" class="link-button" [class.danger]="user.status === 'active'" (click)="askStatusChange(user)">
                {{ user.status === 'active' ? 'Bloquear' : 'Desbloquear' }}
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </section>
</main>

<app-modal-confirm
  [isOpen]="!!selectedUser"
  [title]="selectedUser?.status === 'active' ? 'Bloquear usuario' : 'Desbloquear usuario'"
  [message]="'Cambiar el estado de ' + selectedUser?.username + '?'"
  [confirmText]="selectedUser?.status === 'active' ? 'Bloquear' : 'Desbloquear'"
  [variant]="selectedUser?.status === 'active' ? 'danger' : 'info'"
  (confirmed)="confirmStatusChange()"
  (cancelled)="selectedUser = null"
/>

<app-toast
  [visible]="toast.visible"
  [type]="toast.type"
  [title]="toast.title"
  [message]="toast.message"
  (dismissed)="toast.visible = false"
/>
