
<div class="pattern-bg"></div>

<div class="breadcrumb-wrapper">
  <app-breadcrumb></app-breadcrumb>
</div>

<div class="relative-z-10 container py-5">

  <header class="d-flex justify-content-between align-items-end mb-4">
    <div>
      <h1 class="favorites-title">Mis favoritos</h1>
      <p class="favorites-subtitle">Todos los tesoros que has guardado en tu ToyBox.</p>
    </div>

    <span class="favorites-count">
      {{ totalFavorites }} juguetes guardados
    </span>
  </header>

  <app-toast
    [visible]="toastVisible"
    [type]="toastType"
    [title]="toastTitle"
    [message]="toastMessage"
    (dismissed)="onToastDismissed()">
  </app-toast>

  @if (isLoading) {
    <app-loading-spinner text="Cargando tus favoritos..."></app-loading-spinner>
  } @else {
    @if (totalFavorites > 0) {
      <div class="favorites-grid">
        @for (item of paginatedFavorites; track item.id_items) {

          <app-product-card
            [product]="{
              id: item.id_items,
              title: item.title,
              category: item.category?.name || 'Sin especificar',
              price: item.price,
              location: item.location || 'Sin ubicación',
              status: getStatusText(item.conservation_status),
              image: item.images?.[0]?.photo_url || '/assets/images/placeholder.jpg',
              badge: 'Guardado'
            }"
            (toggleFavorite)="requestRemoveFavorite(item.id_items)">
          </app-product-card>
        }
      </div>

      <div class="mt-4">
        <app-pagination
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          (pageChange)="onPageChange($event)">
        </app-pagination>
      </div>
    } @else {

      <app-empty-state
        icon="🧸"
        title="Aún sin favoritos"
        message="Aún no tienes juguetes guardados en favoritos."
        [buttonText]="'Explorar catálogo'"
        [buttonLink]="'/catalog'">
      </app-empty-state>
    }
  }

</div>

<app-modal-confirm
  [isOpen]="modalConfirmOpen"
  title="¿Quitar de favoritos?"
  message="Este juguete desaparecerá de tu lista de favoritos."
  [confirmText]="'Sí, quitar'"
  [cancelText]="'Cancelar'"
  variant="danger"
  (confirmed)="confirmRemove()"
  (cancelled)="cancelRemove()">
</app-modal-confirm>
