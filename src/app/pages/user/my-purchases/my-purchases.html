<div class="pattern-bg"></div>

<app-navbar></app-navbar>

<div class="container py-5 position-relative" style="z-index: 2;">

  <!-- NAV TABS -->
  <div class="tabs-wrapper mb-4">
    <button
      class="tab-btn"
      [class.active]="activeTab === 'purchases'"
      (click)="switchTab('purchases')">
      Mis compras
    </button>

    <button
      class="tab-btn"
      [class.active]="activeTab === 'sales'"
      (click)="switchTab('sales')">
      Mis ventas
    </button>
  </div>

  <!-- TÍTULO -->
  <h2 class="page-title mb-3">
    {{ activeTab === 'purchases' ? 'Reseñas que yo hice' : 'Reseñas sobre mis productos' }}
  </h2>

  <!-- LISTA DE RESEÑAS -->
  <div class="review-list">
    @for (review of paginatedReviews; track review.id) {
      <div class="review-item shadow-sm">

        <img class="review-img" [src]="review.product_image" />

        <div class="review-info">
          <h5>{{ review.product_title }}</h5>
          <p class="small text-muted">{{ review.date | date:'dd/MM/yyyy' }}</p>

          <!-- ⭐ NUEVA FILA COMPACTA -->
          <div class="rating-row">
            <app-star-rating [rating]="review.rating"></app-star-rating>
            <p class="review-comment">{{ review.comment }}</p>
          </div>

        </div>

      </div>
    }
  </div>

  <!-- PAGINACIÓN -->
  <div class="mt-4">
    <app-pagination
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (pageChange)="onPageChange($event)">
    </app-pagination>
  </div>

</div>

<app-footer></app-footer>
